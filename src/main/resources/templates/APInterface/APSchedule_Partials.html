<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head></head>

<body>

    <!-- Fragment pour le contenu d'un onglet (Filtre Niveau + Tableau) -->
    <div th:fragment="schedule-tab-content(schedules, status)" th:id="'container-' + ${status}">

        <!-- Level Filter -->
        <div class="flex items-center gap-4 mb-8 overflow-x-auto pb-2 scrollbar-hide">
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-muted-foreground-1">NIVEAUX :</span>
            <div class="flex gap-3" aria-label="Tabs" role="tablist" aria-orientation="horizontal">
                <!-- Bouton TOUT -->
                <button type="button" role="tab" th:data-filter-status="${status}" data-filter-level="all"
                    class="level-filter-btn hs-tab-active:bg-primary/20   hs-tab-active:text-primary px-5 py-1.5 text-xs font-semibold rounded-full text-muted-foreground-2 hover:bg-layer/60 transition-all active"
                    th:data-hs-tab="${'#'+status}" th:aria-controls="${status}">All</button>


                <!-- Boutons par Niveau -->
                <button type="button" th:each="n : ${niveaux}" role="tab" th:data-filter-status="${status}"
                    th:data-filter-level="${n.id}"
                    class="level-filter-btn hs-tab-active:bg-primary/20   hs-tab-active:text-primary px-5 py-1.5 text-xs font-semibold rounded-full text-muted-foreground-2 hover:bg-layer/60 transition-all "
                    th:data-hs-tab="${'#'+n.id}" th:aria-controls="${n.id}">
                    <span th:text="${n.ordre}">1</span>
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-card rounded-2xl border border-card-line overflow-hidden ">
            <div class="p-4">
                <div class="relative flex-1 sm:max-w-xs">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 size-4 text-muted-foreground-2"
                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.34-4.34" />
                    </svg>
                    <input type="text" id="student-search" placeholder="Rechercher un étudiant…"
                        class="pl-9 pr-4 py-2 w-full text-sm bg-layer border border-layer-line rounded-xl text-layer-foreground placeholder:text-muted-foreground-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" />
                </div>
            </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-muted/10 border-y border-card-line">
                                <th
                                                        class="px-3 py-3 text-xs font-medium text-muted-foreground-2/60 uppercase tracking-widest">
                                    Classe</th>
                                <th
                                                        class="px-3 py-3 text-xs font-medium text-muted-foreground-2/60 uppercase tracking-widest">
                                    Période</th>
                                <th
                                                        class="px-3 py-3 text-xs font-medium text-muted-foreground-2/60 uppercase tracking-widest">
                                    Semaine</th>
                                <th
                                                        class="px-3 py-3 text-xs font-medium text-muted-foreground-2/60 uppercase tracking-widest">
                                    Actions</th>
                            </tr>
                        </thead>
                        <tbody th:id="'tbody-' + ${status}" class="divide-y divide-card-line">
                            <!-- Initial Data (for Ongoing only, History/Draft will be empty via Controller) -->
                            <tr th:each="et : ${schedules}"
                                th:data-level-id="${specialiteMap[classMap[et.classeId]?.specialiteId]?.niveauId}"
                                class="schedule-row hover:bg-muted/5 transition-colors group">
                                <!-- ... existing cells ... -->
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div
                                            class="size-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary font-bold">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                                <polyline points="9 22 9 12 15 12 15 22" />
                                            </svg>
                                        </div>
                                        <div>
                                            <p class="text-sm font-bold text-layer-foreground"
                                                th:text="${classMap[et.classeId]?.code ?: 'Inconnue'}">Classe</p>
                                            <p class="text-xs text-muted-foreground-2"
                                                th:text="${#strings.capitalize(#strings.toLowerCase(specialiteMap[classMap[et.classeId]?.specialiteId]?.libelle ?: 'Classe'))}">
                                                Libelle</p>
                                        </div>
                                    </div>
                                </td>

                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            class="text-muted-foreground-2">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                            <line x1="16" y1="2" x2="16" y2="6" />
                                            <line x1="8" y1="2" x2="8" y2="6" />
                                            <line x1="3" y1="10" x2="21" y2="10" />
                                        </svg>
                                        <span class="text-sm font-medium text-layer-foreground"
                                            th:text="${#temporals.format(et.dateDebut, 'dd MMM yyyy')} + ' – ' + ${#temporals.format(et.dateFin, 'dd MMM yyyy')}">
                                            01 Jan - 07 Jan
                                        </span>
                                    </div>
                                </td>

                                <td class="px-6 py-4 text-center">
                                    <span
                                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-muted text-muted-foreground-2 border border-layer-line"
                                        th:text="'S' + ${et.semaine}">
                                        S1
                                    </span>
                                </td>

                                <td class="px-6 py-4 text-right">
                                    <div class="flex justify-end items-center gap-2">
                                        <a th:href="@{/ap/schedule/edit(id=${et.id})}"
                                            class="p-2 text-muted-foreground-2 hover:text-primary hover:bg-primary/10 rounded-lg transition-all"
                                            title="Modifier">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                            </svg>
                                        </a>
                                        <button type="button" th:onclick="'deleteSchedule(' + ${et.id} + ')'"
                                            class="p-2 text-muted-foreground-2 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                                            title="Supprimer">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="3 6 5 6 21 6" />
                                                <path
                                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>

                            <!-- Loading Placeholder (JS will hide/show) -->
                            <tr th:if="${#lists.isEmpty(schedules)}" th:id="'placeholder-' + ${status}">
                                <td colspan="4" class="px-6 py-20 text-center">
                                    <div class="flex flex-col items-center gap-3">
                                        <div
                                            class="animate-spin size-8 border-4 border-primary border-t-transparent rounded-full mb-2">
                                        </div>
                                        <p class="text-sm font-bold text-layer-foreground">Chargement des données...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

</body>

</html>
