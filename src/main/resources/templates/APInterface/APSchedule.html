<!doctype html>
<html lang="fr" class="drk" xmlns:th="http://www.thymeleaf.org" data-theme="theme-kemoschool">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KemOSchool — Emploi du temps</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
</head>

<body class="bg-gray-100">

    <!-- ══════════════════════════════════════════════════════
     MAIN VIEW
══════════════════════════════════════════════════════ -->
    <div id="view-main" class="flex h-screen overflow-hidden">

        <section th:replace="~{common/AppSidebar :: app-sidebar('schedule', ${subjectsFiliereId})}"></section>
             <!-- NAVBAR -->
        <header class="flex-none flex flex-row justify-between lg:justify-start lg:flex-nowrap py-2 lg:py-1 bg-navbar relative w-full lg:items-center px-4 md:px-6 lg:px-8 mx-auto border-b border-navbar-line">
                 <!-- Mobile hamburger & actions -->
                 <div class="flex items-center gap-2">
                     <button type="button"
                         class="lg:hidden hs-collapse-toggle size-9 flex justify-center items-center text-sm font-semibold rounded-lg bg-layer border border-layer-line text-layer-foreground hover:bg-layer-hover focus:outline-hidden focus:bg-layer-focus disabled:opacity-50 disabled:pointer-events-none"
                         aria-haspopup="dialog" aria-expanded="false"
                         aria-controls="hs-app-sidebar"
                         data-hs-overlay="#hs-app-sidebar">
                         <svg class="hs-collapse-open:hidden shrink-0 size-4" xmlns="http://www.w3.org/2000/svg"
                             width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                             <line x1="3" x2="21" y1="6" y2="6" />
                             <line x1="3" x2="21" y1="12" y2="12" />
                             <line x1="3" x2="21" y1="18" y2="18" />
                         </svg>
                         <svg class="hs-collapse-open:block hidden shrink-0 size-4" xmlns="http://www.w3.org/2000/svg"
                             width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                             <path d="M18 6 6 18" />
                             <path d="m6 6 12 12" />
                         </svg>
                     </button>
                 </div>
                 <!-- Breadcrumb -->
                 <nav class="hidden lg:flex items-center gap-x-1.5 text-sm text-muted-foreground flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5">
                        <path d="M5 12l-2 0l9-9l9 9l-2 0" />
                        <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7" />
                        <path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6" />
                    </svg>
                    <span>AP Panel</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 6l6 6l-6 6" />
                    </svg>
                    <span class="font-medium text-layer-foreground">Emplois du temps</span>
                </nav>
                 <div class="flex items-center gap-1 lg:gap-2 ms-auto">
                    <button type="button" data-theme-toggle
                        class="size-9 flex justify-center items-center rounded-xl bg-layer border border-layer-line text-layer-foreground hover:bg-muted">
                        <span class="sr-only" data-theme-toggle-label>Passer en theme sombre</span>
                        <svg data-theme-icon="moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 8.607 9.426a9 9 0 1 1 -9 -9.426z" />
                        </svg>
                        <svg data-theme-icon="sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 2v2" />
                            <path d="M12 20v2" />
                            <path d="M4.93 4.93l1.41 1.41" />
                            <path d="M17.66 17.66l1.41 1.41" />
                            <path d="M2 12h2" />
                            <path d="M20 12h2" />
                            <path d="M6.34 17.66l-1.41 1.41" />
                            <path d="M19.07 4.93l-1.41 1.41" />
                        </svg>
                    </button>
                    <button type="button"
                        class="size-9 flex justify-center items-center rounded-xl bg-layer border border-layer-line text-layer-foreground hover:bg-muted">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <path
                                d="M10 5a2 2 0 1 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6" />
                            <path d="M9 17v1a3 3 0 0 0 6 0v-1" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <!-- PAGE CONTENT -->
            <div class="flex-1 flex flex-col overflow-y-auto p-6 lg:p-10 bg-background-1">
                <div class=" w-full mx-auto">

                    <!-- Page Header -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                        <div>
                            <h2 class="text-2xl font-semibold text-layer-foreground">Emplois du temps</h2>
                            <p class="text-base text-muted-foreground-2 mt-1">Gérez les plannings par classe et par
                                période.</p>
                        </div>
                        <button type="button" data-hs-overlay="#modal-new-schedule"
                            class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold bg-primary text-white rounded-xl shadow-xs hover:bg-primary-hover transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M5 12h14M12 5v14" />
                            </svg>
                            Nouvel emploi du temps
                        </button>
                    </div>

                    <!-- Status Tabs -->
                    <div class="border-b border-card-line mb-6">
                        <nav class="flex gap-x-8" aria-label="Tabs" role="tablist">
                            <button type="button"
                                class="hs-tab-active:font-bold hs-tab-active:border-primary hs-tab-active:text-primary py-4 px-1 inline-flex items-center gap-x-2 border-b-2 border-transparent text-sm whitespace-nowrap text-muted-foreground-2 hover:text-primary focus:outline-none active"
                                id="tab-ongoing" data-hs-tab="#pane-ongoing" aria-controls="pane-ongoing" role="tab">
                                En cours

                            </button>
                            <button type="button"
                                class="hs-tab-active:font-bold hs-tab-active:border-primary hs-tab-active:text-primary py-4 px-1 inline-flex items-center gap-x-2 border-b-2 border-transparent text-sm whitespace-nowrap text-muted-foreground-2 hover:text-primary focus:outline-none"
                                id="tab-history" data-hs-tab="#pane-history" aria-controls="pane-history" role="tab">
                                Historique

                            </button>
                            <button type="button"
                                class="hs-tab-active:font-bold hs-tab-active:border-primary hs-tab-active:text-primary py-4 px-1 inline-flex items-center gap-x-2 border-b-2 border-transparent text-sm whitespace-nowrap text-muted-foreground-2 hover:text-primary focus:outline-none"
                                id="tab-draft" data-hs-tab="#pane-draft" aria-controls="pane-draft" role="tab">
                                Brouillon

                            </button>
                        </nav>
                    </div>

                    <!-- Tab Content -->
                    <div class="mt-3">
                        <!-- Ongoing Pane -->
                        <div id="pane-ongoing" role="tabpanel" aria-labelledby="tab-ongoing">
                            <div
                                th:replace="~{APInterface/APSchedule_Partials :: schedule-tab-content(${ongoingSchedules}, 'ongoing')}">
                            </div>
                        </div>

                        <!-- History Pane -->
                        <div id="pane-history" class="hidden" role="tabpanel" aria-labelledby="tab-history">
                            <div
                                th:replace="~{APInterface/APSchedule_Partials :: schedule-tab-content(${historySchedules}, 'history')}">
                            </div>
                        </div>

                        <!-- Draft Pane -->
                        <div id="pane-draft" class="hidden" role="tabpanel" aria-labelledby="tab-draft">
                            <div
                                th:replace="~{APInterface/APSchedule_Partials :: schedule-tab-content(${draftSchedules}, 'draft')}">
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ══ MODAL: Nouvel emploi du temps (Preline) ══ -->
    <div id="modal-new-schedule"
        class="hs-overlay hidden size-full fixed top-0 start-0 z-[60] overflow-x-hidden overflow-y-auto pointer-events-none">
        <div
            class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-sm sm:w-full m-3 sm:mx-auto min-h-[calc(100%-3.5rem)] h-fit flex items-center ">
            <div
                class="w-full flex flex-col bg-layer border border-layer-line shadow-sm rounded-xl pointer-events-auto">
                <div class="flex justify-between items-center py-3 px-4 border-b border-layer-line">
                    <h3 class="font-bold text-layer-foreground">Nouvel emploi du temps</h3>
                    <button type="button"
                        class="inline-flex justify-center items-center size-8 rounded-full bg-muted text-muted-foreground-2 hover:bg-muted-hover focus:outline-none transition-all"
                        data-hs-overlay="#modal-new-schedule">
                        <span class="sr-only">Fermer</span>
                        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
                <div class="p-4 overflow-y-auto ">
                    <div class="space-y-4">
                        <!-- Classe Selection (Advanced Select) -->
                        <div>
                            <label class="block text-sm font-medium mb-2 text-layer-foreground">Sélectionner une
                                classe</label>
                            <select id="select-modal-classe" data-hs-select='{
                                "placeholder": "Choisir une classe...",
                                "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                                "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-3 ps-4 pe-9 flex text-start w-full cursor-pointer bg-layer border border-layer-line rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary",
                                "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-layer border border-layer-line rounded-lg overflow-hidden overflow-y-auto",
                                "optionClasses": "py-2 px-4 w-full text-sm text-layer-foreground cursor-pointer hover:bg-muted rounded-lg focus:outline-none focus:bg-muted",
                                "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-primary\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
                            }' class="hidden">
                                <option value="">Choisir une classe...</option>
                                <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.code}">Classe</option>
                            </select>
                        </div>

                        <!-- Week Selection (Vanilla Calendar in Dropdown) -->
                        <div>
                            <label class="block text-sm font-medium mb-2 text-layer-foreground">Sélectionner la
                                semaine</label>

                            <div
                                class="hs-dropdown [--auto-close:outside] [--strategy:fixed] relative inline-flex w-full ">
                                <button id="btn-schedule-calendar" type="button"
                                    class="hs-dropdown-toggle py-3 px-4 inline-flex items-center justify-between gap-x-2 text-sm font-medium rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-sm hover:bg-muted focus:outline-none w-full"
                                    aria-haspopup="menu" aria-expanded="false">
                                    <span id="selected-week-text">Choisir une semaine...</span>
                                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24"
                                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="m6 9 6 6 6-6" />
                                    </svg>
                                </button>
                                <div class="hs-dropdown-menu transition-[opacity,margin] duration-200 hs-dropdown-open:opacity-100 opacity-0 hidden w-[270px] bg-layer rounded-xl z-[100] p-0"
                                    role="menu" aria-orientation="vertical" aria-labelledby="btn-schedule-calendar">
                                    <div id="calendar" class="vanilla-calendar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end items-center gap-x-2 py-3 px-4 border-t border-layer-line">
                    <button type="button"
                        class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-layer-line bg-layer text-layer-foreground shadow-sm hover:bg-muted focus:outline-none disabled:opacity-50"
                        data-hs-overlay="#modal-new-schedule">
                        Annuler
                    </button>
                    <button id="btn-modal-next" type="button"
                        class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-primary text-white hover:bg-primary-hover focus:outline-none disabled:opacity-50">
                        Suivant
                    </button>
                </div>
            </div>
        </div>
    </div>
    <link rel="stylesheet" th:href="@{/css/vanilla-calendar.css}">

    <script th:src="@{/js/lodash.min.js}"></script>
    <script th:src="@{/js/preline.js}"></script>
    <script type="module" th:src="@{/js/common/themeToggle.js}"></script>

    <script type="module" th:inline="javascript">
        import { initAPScheduleCalendar } from '/js/APInterface/apScheduleCalendar.js';
        import { APScheduleController } from '/js/APInterface/apSchedule.js';
        import { getCalendar } from '/js/common/calendar.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Preline
            if (typeof HSStaticMethods !== 'undefined') {
                HSStaticMethods.autoInit();
            }

            // Initialize Sidebar Calendar (interactive)
            //document.getElementById("calendar-sidebar").innerHTML = getCalendar();

            // Initialize Main Controller (Filters & Modal)
            const classes = /*[[${classes}]]*/[];
            const specialites = /*[[${specialites}]]*/[];
            const today = /*[[${today}]]*/'';
            APScheduleController.init(classes, specialites, today);

            // Initialize Modal Calendar (Using user's original logic)
            initAPScheduleCalendar();

            // Glue logic to capture range from the dropdown text when Next is clicked
            document.getElementById('btn-modal-next')?.addEventListener('click', () => {
                const rangeText = document.querySelector('#btn-schedule-calendar span')?.textContent;
                if (rangeText && rangeText.includes('—')) {
                    const [startStr, endStr] = rangeText.split('—').map(s => s.trim());
                    // DD/MM/YYYY to YYYY-MM-DD
                    const toISO = (fr) => {
                        const [d, m, y] = fr.split('/');
                        return `${y}-${m}-${d}`;
                    };
                    const start = toISO(startStr);
                    const end = toISO(endStr);
                    const weekNo = APScheduleController.getWeekNumber(new Date(start));
                    APScheduleController.setWeekRange(start, end, weekNo);
                }
            });
        });
    </script>


</body>

</html>
