<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" data-theme="theme-kemoschool">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KemOSchool — Connexion</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="h-screen overflow-hidden bg-white">

<div class="flex h-full">

    <!-- ══════════════════════════════════════════
         PANNEAU GAUCHE — formulaire
    ══════════════════════════════════════════ -->
    <div class="w-full lg:w-[52%] flex flex-col h-full bg-white">

        <!-- Header brand -->
        <div class="flex items-center px-10 xl:px-14 pt-9">
            <div class="flex items-center gap-2.5">
                <div class="size-9 rounded-xl bg-primary flex items-center justify-center shrink-0 shadow-md shadow-primary/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <span class="text-sm font-bold text-gray-900 tracking-tight">KemOSchool</span>
            </div>
        </div>

        <!-- Form — centré verticalement -->
        <div class="flex-1 flex items-center justify-center px-10 xl:px-14">
            <div class="w-full max-w-[380px]">

                <!-- Titre -->
                <div class="mb-8">
                    <h1 class="text-[2.15rem] font-extrabold text-gray-900 leading-tight mb-2 tracking-tight">
                        Bon retour<br/>
                        <span class="text-primary">parmi nous.</span>
                    </h1>
                    <p class="text-sm text-gray-400 font-light">Connectez-vous pour accéder à votre espace.</p>
                </div>

                <form id="loginForm" novalidate class="space-y-4">

                    <!-- Email -->
                    <div class="space-y-1.5">
                        <label for="email" class="block text-xs font-semibold text-gray-700 tracking-wide">
                            Adresse email
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round"
                                     class="text-gray-300">
                                    <rect width="20" height="16" x="2" y="4" rx="2"/>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                </svg>
                            </div>
                            <input type="email" id="email"
                                   class="w-full pl-10 pr-4 py-3 text-sm bg-gray-50 border border-gray-200 rounded-xl
                                          text-gray-900 placeholder:text-gray-300
                                          focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary
                                          hover:border-gray-300 transition-all"
                                   placeholder="vous@exemple.com" required />
                        </div>
                    </div>

                    <!-- Mot de passe -->
                    <div class="space-y-1.5">
                        <div class="flex items-center justify-between">
                            <label for="password" class="block text-xs font-semibold text-gray-700 tracking-wide">
                                Mot de passe
                            </label>
                            <a href="#" class="text-xs font-medium text-primary hover:text-primary/80 transition-colors">
                                Oublié ?
                            </a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round"
                                     class="text-gray-300">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                            <input type="password" id="password"
                                   class="w-full pl-10 pr-12 py-3 text-sm bg-gray-50 border border-gray-200 rounded-xl
                                          text-gray-900 placeholder:text-gray-300
                                          focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary
                                          hover:border-gray-300 transition-all"
                                   placeholder="••••••••" required pattern="^.{8,}$" />
                            <button type="button" id="togglePwd" tabindex="-1"
                                    class="absolute inset-y-0 right-0 pr-3.5 flex items-center
                                           text-gray-300 hover:text-primary transition-colors">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
                                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Se souvenir -->
                    <div class="flex items-center gap-2.5 pt-1">
                        <input type="checkbox" id="remember"
                               class="size-4 rounded border-gray-200 text-primary focus:ring-primary/20 accent-primary" />
                        <label for="remember" class="text-xs text-gray-500 cursor-pointer select-none">
                            Rester connecté pendant 7 jours
                        </label>
                    </div>

                    <!-- Message d'erreur -->
                    <div id="otherError"
                         class="hidden items-center gap-2.5 text-xs text-red-600
                                bg-red-50 border border-red-100 rounded-xl px-3.5 py-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" x2="12" y1="8" y2="12"/>
                            <line x1="12" x2="12.01" y1="16" y2="16"/>
                        </svg>
                        <span id="otherErrorText"></span>
                    </div>

                    <!-- Bouton principal -->
                    <button type="submit" id="submitBtn"
                            class="w-full py-3.5 rounded-xl bg-primary text-white text-sm font-bold
                                   hover:bg-primary/90 active:scale-[.98] transition-all
                                   shadow-lg shadow-primary/25
                                   flex items-center justify-center gap-2.5 mt-2">
                        <span id="submitText">Se connecter</span>
                        <svg id="submitSpinner" class="hidden animate-spin size-4"
                             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10"
                                    stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                    </button>

                </form>

            </div>
        </div>

        <!-- Footer -->
        <div class="px-10 xl:px-14 pb-8 flex items-center justify-between">
            <p class="text-xs text-gray-300">
                © <span th:text="${#dates.year(#dates.createNow())}">2026</span> KemOSchool
            </p>

        </div>

    </div>

    <!-- PANNEAU DROIT -->
    <div class="hidden lg:flex lg:w-[48%] items-center justify-center p-8">

        <div class="relative w-full h-full rounded-3xl overflow-hidden bg-background-2 border border-border-line-3 flex flex-col items-center justify-center px-12 gap-8">

            <!-- Carte illustration -->
            <div class="bg-white rounded-3xl shadow-lg p-8 flex items-center justify-center w-56 h-56 border border-border-line-2">
                <img th:src="@{/images/snoopy-work.jpg}"
                     src="/images/snoopy-work.jpg"
                     alt="KemOSchool mascotte"
                     class="w-full h-full object-contain" />
            </div>

            <!-- Texte -->
            <div class="text-center">
                <h2 class="text-2xl font-extrabold leading-tight mb-2.5 tracking-tight text-foreground">
                    Votre campus,<br/>toujours avec vous.
                </h2>
                <p class="text-sm font-light max-w-xs leading-relaxed mx-auto text-muted-foreground-2">
                    Cours, notes, emplois du temps et plus encore — tout en un seul endroit.
                </p>
            </div>

            <!-- Pills -->
            <div class="flex flex-wrap justify-center gap-2">
            <span class="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full border text-[11px] font-semibold bg-white border-border-line-3 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
                </svg>
                Notes & résultats
            </span>
                <span class="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full border text-[11px] font-semibold bg-white border-border-line-3 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                    <line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/>
                    <line x1="3" x2="21" y1="10" y2="10"/>
                </svg>
                Emploi du temps
            </span>
                <span class="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full border text-[11px] font-semibold bg-white border-border-line-3 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Cours en ligne
            </span>
            </div>

        </div>
    </div>

</div>

<script>
    // ── Toggle password visibility ──
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    togglePwd.addEventListener('click', () => {
        const show = pwdInput.type === 'password';
        pwdInput.type = show ? 'text' : 'password';
        eyeIcon.innerHTML = show
            ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" x2="23" y1="1" y2="23"/>`
            : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
               <circle cx="12" cy="12" r="3"/>`;
    });

    // ── Helpers pour AuthController.js ──
    const errorBox  = document.getElementById('otherError');
    const errorText = document.getElementById('otherErrorText');

    window.showError = (msg) => {
        errorText.textContent = msg;
        errorBox.classList.remove('hidden');
        errorBox.classList.add('flex');
    };

    window.hideError = () => {
        errorBox.classList.add('hidden');
        errorBox.classList.remove('flex');
    };

    const submitBtn  = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const spinner    = document.getElementById('submitSpinner');

    window.setLoading = (v) => {
        submitBtn.disabled = v;
        submitText.textContent = v ? 'Connexion…' : 'Se connecter';
        spinner.classList.toggle('hidden', !v);
    };
</script>

<script th:src="@{/js/preline.js}"></script>
<script type="module" th:src="@{/js/Authentification/ui/AuthController.js}"></script>

</body>
</html>
