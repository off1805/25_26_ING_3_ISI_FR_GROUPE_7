<section id="hs-app-sidebar"
         th:fragment="app-sidebar(activePage, subjectsFiliereId)"
         xmlns:th="http://www.thymeleaf.org"
         class="hs-overlay [--auto-close:lg] hs-overlay-minified:w-fit lg:translate-x-0 lg:end-auto lg:bottom-0
                w-64 hs-overlay-open:translate-x-0 -translate-x-full transition-all duration-300 transform
                h-full hidden lg:flex lg:flex-col z-60
                bg-sidebar border-e border-sidebar-line"
         role="dialog" tabindex="-1" aria-label="Sidebar">

    <div class="hidden lg:block">
        <button type="button"
                class="flex justify-center items-center flex-none size-7 text-sm text-muted-foreground-2
                       hover:bg-muted-hover rounded-full bg-sidebar border border-card-line shadow-sm
                       absolute right-0 translate-x-1/2 top-6 z-10"
                aria-haspopup="dialog" aria-expanded="false"
                aria-controls="hs-app-sidebar"
                data-hs-overlay-minifier="#hs-app-sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="hidden hs-overlay-minified:block">
                <path d="M9 6l6 6l-6 6"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="hs-overlay-minified:hidden">
                <path d="M15 6l-6 6l6 6"/>
            </svg>
        </button>
    </div>

    <div class="flex flex-col h-full overflow-x-hidden">

        <!-- Brand -->
        <div class="px-5 py-5 flex items-center gap-3 hs-overlay-minified:justify-center hs-overlay-minified:px-2">
            <div class="size-9 rounded-xl bg-primary flex items-center justify-center shrink-0 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
            </div>

            <div class="hs-overlay-minified:hidden">
                <p class="font-bold text-sm text-layer-foreground leading-tight">KemOSchool</p>
                <p id="sidebar-role-label" class="text-xs text-muted-foreground-2">ROLE</p>
            </div>

            <button type="button"
                    class="lg:hidden ms-auto size-7 flex items-center justify-center rounded-lg text-muted-foreground-2 hover:bg-muted"
                    data-hs-overlay="#hs-app-sidebar">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
            </button>
        </div>

        <!-- Debug temporaire -->
        <div class="px-3 py-2 text-xs text-red-500 hs-overlay-minified:hidden hidden" id="sidebar-debug-box">
            <p id="sidebar-debug-role">currentRole = NULL</p>
            <p id="sidebar-debug-name">displayName = NULL</p>
        </div>

        <!-- Nav -->
        <nav class="flex-1 overflow-y-auto px-3 pb-3
                    [&::-webkit-scrollbar]:w-1.5
                    [&::-webkit-scrollbar-track]:bg-transparent
                    [&::-webkit-scrollbar-thumb]:rounded-full
                    [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">

            <div class="mb-1">
                <p class="px-2.5 mb-1.5 text-xs font-bold uppercase tracking-widest text-muted-foreground-2 hs-overlay-minified:hidden">
                    Menu
                </p>

                <ul class="space-y-0.5">

                    <!-- ADMIN -->
                    <li data-role="ADMIN">
                        <a th:href="@{/admin/users}"
                           th:classappend="${activePage == 'users'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'users'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Utilisateurs</span>
                        </a>
                    </li>

                    <li data-role="ADMIN">
                        <a th:href="@{/admin/school}"
                           th:classappend="${activePage == 'school'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'school'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M12 5m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                                    <path d="M5 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                                    <path d="M19 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                                    <path d="M12 7v3a2 2 0 0 1 -2 2h-2a2 2 0 0 0 -2 2v1"/>
                                    <path d="M12 7v3a2 2 0 0 0 2 2h2a2 2 0 0 1 2 2v1"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Schéma académique</span>
                        </a>
                    </li>

                    <li data-role="ADMIN">
                        <a th:href="@{/admin/config}"
                           th:classappend="${activePage == 'config'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'config'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"/>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Paramètres</span>
                        </a>
                    </li>

                    <!-- AP -->
                    <li data-role="AP">
                        <a th:href="${subjectsFiliereId != null} ? @{/ap/filiere/{id}(id=${subjectsFiliereId})} : @{/ap/filiere/1}"
                           th:classappend="${activePage == 'subjects'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'subjects'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Matières</span>
                        </a>
                    </li>

                    <li data-role="AP">
                        <a th:href="@{/ap/schedule}"
                           th:classappend="${activePage == 'schedule'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'schedule'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                                    <path d="M16 2v4"/>
                                    <path d="M8 2v4"/>
                                    <path d="M3 10h18"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Emploi du temps</span>
                        </a>
                    </li>

                    <li data-role="AP">
                        <a th:href="@{/ap/classes}"
                           th:classappend="${activePage == 'classes'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'classes'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Classes</span>
                        </a>
                    </li>

                    <!-- TEACHER -->
                    <li data-role="TEACHER">
                        <a th:href="@{/teacher/dashboard}"
                           th:classappend="${activePage == 'dashboard'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'dashboard'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <rect x="3" y="3" width="7" height="7" rx="2"/>
                                    <rect x="14" y="3" width="7" height="4" rx="2"/>
                                    <rect x="14" y="10" width="7" height="11" rx="2"/>
                                    <rect x="3" y="13" width="7" height="8" rx="2"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Dashboard</span>
                        </a>
                    </li>

                    <li data-role="TEACHER">
                        <a th:href="@{/teacher/seance}"
                           th:classappend="${activePage == 'seance'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'seance'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M2 7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z"/>
                                    <path d="M16 9l5-3v12l-5-3"/>
                                    <path d="M7 10h4"/>
                                    <path d="M7 14h2"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Séances cours</span>
                        </a>
                    </li>

                    <li data-role="TEACHER">
                        <a th:href="@{/teacher/schedule}"
                           th:classappend="${activePage == 'schedule'} ?
                           'bg-primary text-white hover:bg-primary/90' :
                           'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'"
                           class="group w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium rounded-xl
                                  focus:outline-none transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'schedule'} ? 'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="17" rx="2"/>
                                    <path d="M8 2v4"/>
                                    <path d="M16 2v4"/>
                                    <path d="M3 10h18"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Emploi du temps</span>
                        </a>
                    </li>

                </ul>
            </div>
        </nav>

        <!-- Profile -->
        <div class="flex items-center gap-3 px-5 py-5 border-t border-sidebar-line hs-overlay-minified:justify-center hs-overlay-minified:px-2 hs-overlay-minified:py-5">
            <div class="size-10 rounded-full bg-primary/10 border border-primary/20 shrink-0 flex items-center justify-center text-primary">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="size-5"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.8"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20a8 8 0 0 1 16 0"></path>
                </svg>
            </div>

            <div class="hs-overlay-minified:hidden min-w-0 flex-1">
                <p id="sidebar-display-name" class="text-sm font-bold text-layer-foreground truncate">Utilisateur</p>
                <p id="sidebar-role-text" class="text-xs text-muted-foreground-2 truncate">ROLE</p>
            </div>
        </div>
    </div>
    <script th:src="@{/js/Authentification/ui/sidebar-jwt.js}"></script>
</section>
