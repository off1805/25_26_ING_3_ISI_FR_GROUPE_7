<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment : app-error-modal
  ───────────────────────────
  Inclusion dans un template :

      <div th:replace="~{common/errorModal :: app-error-modal}"></div>

  Ce fragment fournit la structure HTML du modal d'erreur global.
  Il est contrôlé entièrement par globalErrorHandler.js (AppErrorHandler.show / .close).

  ⚠️ Ce fragment est OPTIONNEL : globalErrorHandler.js injecte automatiquement
  le modal dans le DOM si celui-ci est absent. Inclure ce fragment améliore
  le rendu initial (pas de flash d'injection) et facilite le débogage.
-->

<th:block th:fragment="app-error-modal">

  <!-- ── AppErrorModal ──────────────────────────────────────────────────── -->
  <div id="app-error-modal"
       class="fixed inset-0 z-[9999] flex items-center justify-center p-4 hidden"
       role="alertdialog"
       aria-modal="true"
       aria-labelledby="aem-title"
       aria-describedby="aem-message">

    <!-- Backdrop -->
    <div id="aem-backdrop"
         class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-200 opacity-0">
    </div>

    <!-- Panel principal -->
    <div id="aem-panel"
         class="relative w-full max-w-md rounded-2xl shadow-2xl border border-card-line
                overflow-hidden transition-all duration-200 scale-95 opacity-0 bg-card">

      <!-- Barre colorée (catégorie visuelle) -->
      <div id="aem-bar" class="h-1 w-full bg-red-500"></div>

      <!-- Corps -->
      <div id="aem-body" class="p-6">

        <!-- En-tête : icône + badge + titre + sous-titre -->
        <div class="flex items-start gap-4 mb-5">
          <div id="aem-icon-wrap"
               class="shrink-0 size-12 rounded-xl flex items-center justify-center
                      bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-400">
            <span id="aem-icon">
              <!-- SVG injecté dynamiquement par globalErrorHandler.js -->
            </span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              <span id="aem-badge"
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold
                           bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300">
                Erreur
              </span>
            </div>
            <h3 id="aem-title"
                class="text-base font-bold text-layer-foreground leading-tight">
              Erreur
            </h3>
            <p id="aem-subtitle"
               class="text-xs text-muted-foreground-2 mt-0.5 leading-relaxed">
            </p>
          </div>
        </div>

        <!-- Message principal -->
        <div id="aem-message-wrap"
             class="rounded-xl border border-red-200 dark:border-red-800 p-4 mb-5
                    text-sm text-layer-foreground leading-relaxed
                    bg-red-50 dark:bg-red-950/30">
          <p id="aem-message">Une erreur est survenue.</p>
        </div>

        <!-- Détails techniques (accordéon, masqué par défaut) -->
        <details id="aem-details-wrap" class="mb-5 hidden">
          <summary
            class="text-xs text-muted-foreground-2 cursor-pointer select-none
                   hover:text-layer-foreground transition-colors">
            Détails techniques
          </summary>
          <pre id="aem-details"
               class="mt-2 text-xs text-muted-foreground-2 bg-muted rounded-lg p-3
                      overflow-x-auto whitespace-pre-wrap break-all leading-relaxed">
          </pre>
        </details>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3">

          <!-- Bouton "Réessayer" (affiché uniquement si un callback est fourni) -->
          <button id="aem-btn-retry"
                  type="button"
                  class="hidden px-4 py-2 text-sm font-semibold rounded-xl border border-layer-line
                         text-layer-foreground hover:bg-muted transition-colors
                         focus:outline-none focus:ring-2 focus:ring-offset-1">
            <svg class="inline w-3.5 h-3.5 mr-1.5 -mt-0.5"
                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
            </svg>
            Réessayer
          </button>

          <!-- Bouton principal (fermer / reconnecter / corriger…) -->
          <button id="aem-btn-action"
                  type="button"
                  class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors
                         focus:outline-none focus:ring-2 focus:ring-offset-1
                         bg-red-500 hover:bg-red-600 text-white">
            Fermer
          </button>

        </div><!-- /actions -->
      </div><!-- /aem-body -->
    </div><!-- /aem-panel -->
  </div>
  <!-- ── /AppErrorModal ─────────────────────────────────────────────────── -->

</th:block>
</body>
</html>
