<section xmlns:th="http://www.thymeleaf.org" id="hs-sidebar-content-push-to-mini-sidebar" th:fragment="admin-sidebar(activePage)" class=" hs-overlay [--auto-close:lg] hs-overlay-minified:w-fit lg:block lg:translate-x-0 lg:end-auto lg:bottom-0 w-64

-translate-x-full transition-all duration-300 transform

 z-60

bg-sidebar border-e border-sidebar-line" role="dialog" tabindex="-1" aria-label="Sidebar">
    <div class="relative flex flex-col h-full max-h-full ">
        <!-- Header -->
        <header class="py-4 px-2  flex justify-between items-center gap-x-2">

            <a class="flex-none font-semibold text-xl text-layer-foreground focus:outline-hidden focus:opacity-80 hs-overlay-minified:hidden"
                href="#" aria-label="Brand">Brand</a>

            <div class="lg:hidden">
                <!-- Close Button -->
                <button type="button"
                    class="flex justify-center items-center gap-x-3 size-6 bg-layer border border-layer-line text-sm text-muted-foreground-2 hover:bg-layer-hover rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus"
                    data-hs-overlay="#hs-sidebar-content-push-to-mini-sidebar">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                    <span class="sr-only">Close</span>
                </button>
                <!-- End Close Button -->
            </div>
            <div class="hidden lg:block">
                <!-- Toggle Button -->
                <button type="button"
                    class="flex justify-center items-center flex-none gap-x-3 size-9 text-sm text-muted-foreground-2 hover:bg-muted-hover rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-muted-focus"
                    aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-sidebar-content-push-to-mini-sidebar"
                    aria-label="Minify navigation" data-hs-overlay-minifier="#hs-sidebar-content-push-to-mini-sidebar">
                    <svg class="hidden hs-overlay-minified:block shrink-0 size-4" xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M15 3v18" />
                        <path d="m8 9 3 3-3 3" />
                    </svg>
                    <svg class="hs-overlay-minified:hidden shrink-0 size-4" xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M15 3v18" />
                        <path d="m10 15-3-3 3-3" />
                    </svg>
                    <span class="sr-only">Navigation Toggle</span>
                </button>
                <!-- End Toggle Button -->
            </div>
        </header>
        <!-- End Header -->

        <!-- Body -->
        <nav data-admin-sidebar class="flex-1 overflow-y-auto px-2 pb-3
                    [&::-webkit-scrollbar]:w-1.5
                    [&::-webkit-scrollbar-track]:bg-transparent
                    [&::-webkit-scrollbar-thumb]:rounded-full
                    [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">

            <!-- Section: MENU -->
            <div class="mb-1">
                <p
                    class="px-2.5 mb-1.5 text-xs font-bold uppercase tracking-widest text-muted-foreground-2 hs-overlay-minified:hidden">
                    Menu
                </p>
                <ul class="space-y-0.5">

                    <li>
                        <a data-admin-bc-label="Utilisateurs"
                           th:attr="aria-current=${activePage == 'users'} ? 'page' : null"
                           th:href="@{/admin/users}" th:classappend="${activePage == 'users'} ?
     'bg-primary text-white hover:bg-primary/90' :
     'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'" class="group   w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
          rounded-xl focus:outline-none transition-colors
          hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'users'} ?
            'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                  class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                     width="16" height="16"
                                     viewBox="0 0 24 24"
                                     fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.75"
                                     stroke-linecap="round"
                                     stroke-linejoin="round">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
</svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Utilisateurs</span>
                        </a>

                    </li>

                    <li>
                        <a data-admin-bc-label="Cycles"
                           th:attr="aria-current=${activePage == 'school'} ? 'page' : null"
                           th:href="@{/admin/school}" th:classappend="${activePage == 'school'} ?
     'bg-primary text-white hover:bg-primary/90' :
     'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'" class="group   w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
          rounded-xl focus:outline-none transition-colors
          hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'school'} ?
            'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M12 5m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M5 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M19 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M12 7v3a2 2 0 0 1 -2 2h-2a2 2 0 0 0 -2 2v1" />
                                    <path d="M12 7v3a2 2 0 0 0 2 2h2a2 2 0 0 1 2 2v1" />
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Schema academique</span>
                        </a>

                    </li>

                   

                    <li>
                        <a data-admin-bc-label="Étudiants"
                           th:attr="aria-current=${activePage == 'students'} ? 'page' : null"
                           th:href="@{/admin/students}" th:classappend="${activePage == 'students'} ?
     'bg-primary text-white hover:bg-primary/90' :
     'text-sidebar-nav-foreground hover:bg-sidebar-nav-hover focus:bg-sidebar-nav-focus'" class="group   w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
          rounded-xl focus:outline-none transition-colors
          hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span th:classappend="${activePage == 'students'} ?
            'bg-white/20' : 'bg-muted group-hover:bg-primary/10'"
                                class="size-8 rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                     width="16" height="16"
                                     viewBox="0 0 24 24"
                                     fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.75"
                                     stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Étudiants</span>
                        </a>
                    </li>

                </ul>
            </div>



        </nav>
        <!-- End Body -->
        <div class="flex items-center gap-3 px-5 py-5 border-t border-sidebar-line hs-overlay-minified:justify-center hs-overlay-minified:px-2 hs-overlay-minified:py-5">
            <div class="size-9 rounded-full bg-primary/10 border border-primary/20 overflow-hidden shrink-0 flex items-center justify-center text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
                    <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" />
                </svg>
            </div>
            <div class="hs-overlay-minified:hidden min-w-0 flex-1">
                <p class="text-sm font-bold text-layer-foreground truncate" th:text="${adminName} ?: 'Admin Name'">Admin Name</p>
                <p class="text-xs text-muted-foreground-2 truncate">Administrateur</p>
            </div>
            <button type="button"
                    class="hs-overlay-minified:hidden size-7 flex items-center justify-center rounded-lg text-muted-foreground-2 hover:bg-muted transition-colors shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" x2="9" y1="12" y2="12"/>
                </svg>
            </button>
        </div>
    </div>
</section>
