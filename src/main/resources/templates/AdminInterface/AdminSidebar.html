<!-- ========== SIDEBAR ========== -->
<section id="hs-sidebar-content-push-to-mini-sidebar" th:fragment="admin-sidebar" xmlns:th="http://www.thymeleaf.org"
         class="hs-overlay [--auto-close:lg] hs-overlay-minified:w-fit lg:translate-x-0 lg:end-auto lg:bottom-0
         w-64 hs-overlay-open:translate-x-0 -translate-x-full transition-all duration-300 transform
         h-full hidden lg:flex lg:flex-col z-60
         bg-sidebar border-e border-sidebar-line"
         role="dialog" tabindex="-1" aria-label="Sidebar">

    <!-- Minify toggle button -->
    <div class="hidden lg:block">
        <button type="button"
                class="flex justify-center items-center flex-none size-7 text-sm text-muted-foreground-2
                       hover:bg-muted-hover rounded-full bg-sidebar border border-card-line shadow-sm
                       absolute right-0 translate-x-1/2 top-6 z-10"
                aria-haspopup="dialog" aria-expanded="false"
                aria-controls="hs-sidebar-content-push-to-mini-sidebar"
                data-hs-overlay-minifier="#hs-sidebar-content-push-to-mini-sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="hidden hs-overlay-minified:block">
                <path d="M9 6l6 6l-6 6" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="hs-overlay-minified:hidden">
                <path d="M15 6l-6 6l6 6" />
            </svg>
        </button>
    </div>

    <div class="flex flex-col h-full overflow-x-hidden">

        <!-- Brand -->
        <div class="px-5 py-5 flex items-center gap-3 hs-overlay-minified:justify-center hs-overlay-minified:px-2">
            <div class="size-9 rounded-xl bg-primary flex items-center justify-center shrink-0 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
            </div>
            <div class="hs-overlay-minified:hidden">
                <p class="font-bold text-sm text-layer-foreground leading-tight">KemOSchool</p>
                <p class="text-xs text-muted-foreground-2">Admin Panel</p>
            </div>
            <!-- Mobile close -->
            <button type="button" class="lg:hidden ms-auto size-7 flex items-center justify-center rounded-lg text-muted-foreground-2 hover:bg-muted"
                    data-hs-overlay="#hs-sidebar-content-push-to-mini-sidebar">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <!-- Nav scrollable -->
        <nav class="flex-1 overflow-y-auto px-3 pb-3
                    [&::-webkit-scrollbar]:w-1.5
                    [&::-webkit-scrollbar-track]:bg-transparent
                    [&::-webkit-scrollbar-thumb]:rounded-full
                    [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">

            <!-- Section: MENU -->
            <div class="mb-1">
                <p class="px-2.5 mb-1.5 text-xs font-bold uppercase tracking-widest text-muted-foreground-2 hs-overlay-minified:hidden">
                    Menu
                </p>
                <ul class="space-y-0.5">

                    <li>
                        <a th:href="@{/admin/users}"
                           class="group min-h-9 w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
                                  text-sidebar-nav-foreground rounded-xl
                                  hover:bg-sidebar-nav-hover
                                  focus:outline-none focus:bg-sidebar-nav-focus
                                  transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span class="size-8 rounded-lg bg-muted flex items-center justify-center shrink-0
                                         group-hover:bg-primary/10 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                     stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M5 7a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
                                    <path d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" />
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                                    <path d="M21 21v-2a4 4 0 0 0 -3 -3.85" />
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Utilisateurs</span>
                        </a>
                    </li>

                    <li>
                        <a th:href="@{/admin/school}"
                           class="group min-h-9 w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
                                  bg-primary text-white rounded-xl shadow-sm
                                  hover:bg-primary/90
                                  focus:outline-none
                                  transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span class="size-8 rounded-lg bg-white/20 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                     stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 5m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M5 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M19 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
                                    <path d="M12 7v3a2 2 0 0 1 -2 2h-2a2 2 0 0 0 -2 2v1" />
                                    <path d="M12 7v3a2 2 0 0 0 2 2h2a2 2 0 0 1 2 2v1" />
                                </svg>
                            </span>
                            <span class="hs-overlay-minified:hidden">Cycles</span>
                        </a>
                    </li>

                    <li>
                        <a th:href="@{/admin/subjects}"
                           class="group min-h-9 w-full flex items-center gap-x-3 py-2 px-2.5 text-sm font-medium
                                  text-sidebar-nav-foreground rounded-xl
                                  hover:bg-sidebar-nav-hover
                                  focus:outline-none focus:bg-sidebar-nav-focus
                                  transition-colors hs-overlay-minified:justify-center hs-overlay-minified:w-fit">
                            <span class="size-8 rounded-lg bg-muted flex items-center justify-center shrink-0
             group-hover:bg-primary/10 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
         viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5a3 3 0 0 1 3 -3h13v18h-13a3 3 0 0 0 -3 3z"/>
        <path d="M7 2v18"/>
    </svg>
</span>
                            <span class="hs-overlay-minified:hidden">Matières</span>
                        </a>
                    </li>

                </ul>
            </div>



        </nav>

        <!-- Admin profile -->
        <div class="flex items-center gap-3 px-1 hs-overlay-minified:justify-center">
            <div class="size-9 rounded-full bg-primary/10 border border-primary/20 overflow-hidden shrink-0 flex items-center justify-center text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
                    <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" />
                </svg>
            </div>
            <div class="hs-overlay-minified:hidden min-w-0 flex-1">
                <p class="text-sm font-bold text-layer-foreground truncate">Admin Caleb</p>
                <p class="text-xs text-muted-foreground-2 truncate">Administrateur</p>
            </div>
            <button type="button"
                    class="hs-overlay-minified:hidden size-7 flex items-center justify-center rounded-lg text-muted-foreground-2 hover:bg-muted transition-colors shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" x2="9" y1="12" y2="12"/>
                </svg>
            </button>
        </div>

    </div>

    </div>
</section>
<!-- ========== END SIDEBAR ========== -->

<script th:src="@{/js/preline.js}" xmlns:th="http://www.thymeleaf.org"></script>
