<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" data-theme="theme-kemoschool">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>KemOSchool — Configuration</title>
    <link rel="stylesheet" th:href="@{/css/output.css}"/>
</head>
<body class="h-screen bg-background-1 flex flex-row overflow-hidden">

<section th:replace="~{common/AppSidebar :: app-sidebar('config', null)}"></section>

<div class="flex-1 flex flex-col overflow-hidden">

    <header class="flex-none flex justify-between items-center px-4 md:px-6 lg:px-8 py-2
                   bg-navbar border-b border-navbar-line">
        <nav class="hidden lg:flex items-center gap-x-1.5 text-sm text-muted-foreground">
            <span class="text-muted-foreground-2">Administration</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            <span class="font-semibold text-layer-foreground">Configuration</span>
        </nav>
        <div class="flex items-center gap-2">
            <button type="button" data-theme-toggle
                    class="size-9 flex justify-center items-center rounded-xl bg-layer border border-layer-line
                           text-layer-foreground hover:bg-muted">
                <svg data-theme-icon="moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 8.607 9.426a9 9 0 1 1 -9 -9.426z"/>
                </svg>
                <svg data-theme-icon="sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6 lg:px-8">
        <div class="max-w-3xl mx-auto space-y-8">

            <div>
                <h1 class="text-2xl font-black text-layer-foreground">Configuration</h1>
                <p class="text-sm text-muted-foreground-2 mt-1">Gérez les paramètres globaux de l'application.</p>
            </div>

            <div id="config-feedback" class="hidden rounded-2xl border px-4 py-3 text-sm font-semibold"></div>

            <!-- Créer une nouvelle année -->
            <section class="rounded-[28px] border border-card-line bg-card px-6 py-6 shadow-sm">
                <div class="flex items-center gap-3 mb-5">
                    <div class="size-10 rounded-xl bg-primary/10 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="1.75" class="text-primary">
                            <rect x="3" y="5" width="18" height="16" rx="2"/>
                            <path d="M8 3v4M16 3v4M3 11h18"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-bold text-layer-foreground">Année académique</h2>
                        <p class="text-xs text-muted-foreground-2">Créez et activez l'année scolaire en cours.</p>
                    </div>
                </div>

                <form id="create-annee-form" class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1">
                        <label for="annee-debut" class="block text-xs font-bold uppercase tracking-widest
                                                        text-muted-foreground-2 mb-1.5">Année de début</label>
                        <input id="annee-debut" type="number" min="2000" max="2100"
                               placeholder="Ex : 2025"
                               class="w-full rounded-2xl border border-layer-line bg-layer px-4 py-3 text-sm
                                      text-layer-foreground placeholder:text-muted-foreground-2
                                      focus:outline-none focus:ring-1 focus:ring-primary"/>
                    </div>
                    <div class="flex items-end">
                        <button type="submit"
                                class="w-full sm:w-auto inline-flex items-center justify-center gap-2 rounded-2xl
                                       bg-primary px-6 py-3 text-sm font-bold text-white
                                       hover:bg-primary/90 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            Créer
                        </button>
                    </div>
                </form>
            </section>

            <!-- Liste des années existantes -->
            <section class="rounded-[28px] border border-card-line bg-card px-6 py-6 shadow-sm">
                <h2 class="text-base font-bold text-layer-foreground mb-5">Années enregistrées</h2>
                <div id="annees-list" class="space-y-3">
                    <div class="text-sm text-muted-foreground-2">Chargement...</div>
                </div>
            </section>

        </div>
    </main>
</div>

<script th:src="@{/js/preline.js}"></script>
<script type="module" th:src="@{/js/common/themeToggle.js}"></script>
<script type="module" th:src="@{/js/AdminInterface/adminAnneeConfig.js}"></script>
</body>
</html>
