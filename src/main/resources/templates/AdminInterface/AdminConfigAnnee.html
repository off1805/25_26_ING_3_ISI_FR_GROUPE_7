<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" data-theme="theme-kemoschool">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>KemOSchool — Année scolaire</title>
    <link rel="stylesheet" th:href="@{/css/output.css}"/>
</head>

<body class="h-screen overflow-hidden bg-background-1 flex flex-col">

<!-- TOP BAR -->
<header class="flex-none flex items-center justify-between px-6 sm:px-10 py-4 border-b border-card-line">
    <div class="flex items-center gap-3">
        <div class="size-9 rounded-xl bg-primary flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="2">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
        </div>
        <span class="text-base font-black text-layer-foreground">KemOSchool</span>
    </div>
    <!-- Dans le header, remplace l'ancien lien -->
    <a th:href="@{/admin/users}"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-card-line
          bg-muted text-sm font-semibold text-muted-foreground-2
          hover:border-primary/30 hover:text-layer-foreground hover:bg-primary/5
          active:scale-95 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
        Ignorer pour l'instant
    </a>
</header>

<!-- MAIN -->
<main class="flex-1 flex flex-col lg:flex-row overflow-hidden">

    <!-- ═══ LEFT — infos + boutons ═══ -->
    <div class="flex flex-col justify-center px-8 sm:px-12 lg:px-16 xl:px-24
                    py-6 lg:py-0 lg:w-5/12 gap-5 lg:gap-7">

        <div class="flex items-center gap-2">
            <div class="size-5 rounded-full bg-primary flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24"
                     fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span class="text-xs font-bold text-primary uppercase tracking-widest">Configuration initiale</span>
        </div>

        <div>
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-black text-layer-foreground leading-none">
                Année<br/>scolaire
            </h1>
            <p class="text-sm text-muted-foreground-2 mt-4 leading-relaxed max-w-xs">
                Sélectionnez l'année active. Emplois du temps,
                présences et notes s'y référeront automatiquement.
            </p>
        </div>

        <!-- Selected -->
        <div class="flex items-center gap-4 py-4 border-t border-b border-card-line">
            <div class="size-10 rounded-xl bg-primary/10 flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.75" class="text-primary">
                    <rect x="3" y="5" width="18" height="16" rx="2"/>
                    <path d="M8 3v4M16 3v4M3 11h18"/>
                </svg>
            </div>
            <div>
                <p class="text-xs text-muted-foreground-2 font-bold uppercase tracking-widest">Sélectionnée</p>
                <p class="text-2xl font-black text-primary leading-tight" id="selected-year-label">—</p>
            </div>
        </div>

        <!-- Confirm -->
        <form th:action="@{/admin/annee-scolaire}" method="post">
            <input type="hidden" name="annee" id="annee-input" th:value="${anneeActive}"/>
            <button type="submit"
                    class="w-full py-4 rounded-2xl bg-primary text-white text-base font-bold
                               hover:bg-primary/90 active:scale-95 transition-all focus:outline-none
                               flex items-center justify-center gap-2.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                Confirmer cette année
            </button>
        </form>

        <!-- Prev / Next -->
        <div class="flex gap-3">
            <button type="button" id="btn-prev"
                    class="flex-1 flex items-center justify-center gap-1.5 py-3 rounded-xl
                               bg-muted border border-card-line text-layer-foreground text-sm font-bold
                               hover:bg-primary/5 hover:border-primary/30 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5"><path d="m18 15-6-6-6 6"/></svg>
                Précédente
            </button>
            <button type="button" id="btn-next"
                    class="flex-1 flex items-center justify-center gap-1.5 py-3 rounded-xl
                               bg-muted border border-card-line text-layer-foreground text-sm font-bold
                               hover:bg-primary/5 hover:border-primary/30 active:scale-95 transition-all">
                Suivante
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
            </button>
        </div>


    </div>

    <!-- DIVIDER desktop -->
    <div class="hidden lg:flex items-stretch py-10">
        <div class="w-px bg-card-line"></div>
    </div>

    <!-- DIVIDER mobile -->
    <div class="lg:hidden h-px bg-card-line mx-8"></div>

    <!-- ═══ RIGHT — slot machine ═══ -->
    <div class="flex-1 flex items-center justify-center px-8 sm:px-12 lg:px-16 xl:px-24 py-6 lg:py-0">

        <div class="relative w-full max-w-md cursor-ns-resize select-none" id="slot-viewport">

            <!-- Fades -->
            <div class="absolute inset-x-0 top-0 h-28 bg-gradient-to-b from-background-1 to-transparent pointer-events-none z-10"></div>
            <div class="absolute inset-x-0 bottom-0 h-28 bg-gradient-to-t from-background-1 to-transparent pointer-events-none z-10"></div>

            <!-- Center lines -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-16
                            border-t border-b border-primary/30 pointer-events-none z-10"></div>

            <!-- Left accent -->
            <div class="absolute left-0 top-1/2 -translate-y-1/2 h-16 w-1 rounded-r-full bg-primary pointer-events-none z-10"></div>

            <!-- Track -->
            <div class="absolute w-full" id="slot-track"></div>
        </div>

    </div>
</main>

<script th:src="@{/js/preline.js}"></script>
<script th:inline="javascript">
    (function () {

        const ITEM_H  = 68;
        const VISIBLE = 7;

        const now       = new Date();
        const curYear   = now.getFullYear();
        const startYear = curYear - 6;
        const endYear   = curYear + 4;
        const years     = [];

        for (let y = startYear; y <= endYear; y++) {
            years.push(y + ' \u2013 ' + (y + 1));
        }

        const targetIdx = curYear - startYear;

        const viewport = document.getElementById('slot-viewport');
        const track    = document.getElementById('slot-track');
        const label    = document.getElementById('selected-year-label');
        const inp      = document.getElementById('annee-input');
        const btnPrev  = document.getElementById('btn-prev');
        const btnNext  = document.getElementById('btn-next');

        viewport.style.height = (ITEM_H * VISIBLE) + 'px';
        const center = (ITEM_H * VISIBLE) / 2 - ITEM_H / 2;

        let sel = 0;
        let spinning = false;

        years.forEach(function (yr, i) {
            const d = document.createElement('div');
            d.style.height        = ITEM_H + 'px';
            d.style.display       = 'flex';
            d.style.alignItems    = 'center';
            d.style.paddingLeft   = '1.25rem';
            d.style.fontWeight    = '900';
            d.style.letterSpacing = '-0.03em';
            d.style.cursor        = 'pointer';
            d.style.userSelect    = 'none';
            d.style.transition    = 'color .2s, font-size .2s, opacity .2s';
            d.textContent         = yr;
            d.addEventListener('click', function () { snap(i, true); });
            track.appendChild(d);
        });

        function paint(idx) {
            Array.from(track.children).forEach(function (c, i) {
                const d = Math.abs(i - idx);
                if (d === 0)      { c.style.color = 'var(--primary)';          c.style.fontSize = '2.25rem'; c.style.opacity = '1'; }
                else if (d === 1) { c.style.color = 'var(--layer-foreground)'; c.style.fontSize = '1.3rem';  c.style.opacity = '0.5'; }
                else if (d === 2) { c.style.color = 'var(--muted-foreground)'; c.style.fontSize = '0.95rem'; c.style.opacity = '0.22'; }
                else              { c.style.color = 'var(--muted-foreground)'; c.style.fontSize = '0.8rem';  c.style.opacity = '0.06'; }
            });
        }

        function snap(idx, animated) {
            if (spinning && animated) return;
            sel = Math.max(0, Math.min(years.length - 1, idx));
            paint(sel);
            track.style.transition = animated ? 'transform .32s cubic-bezier(.25,.46,.45,.94)' : 'none';
            track.style.transform  = 'translateY(' + (center - sel * ITEM_H) + 'px)';
            label.textContent = years[sel];
            inp.value         = years[sel];
        }

        function spinAndLand() {
            spinning = true;
            const t0 = performance.now();
            const dur = 2600;
            function ease(t) { return 1 - Math.pow(1 - t, 4); }
            function tick(now) {
                const t   = Math.min((now - t0) / dur, 1);
                const pos = -1.5 + ease(t) * (targetIdx + 1.5);
                const off = center - pos * ITEM_H;
                track.style.transition = 'none';
                track.style.transform  = 'translateY(' + off + 'px)';
                const ai = Math.round(pos);
                paint(Math.max(0, Math.min(years.length - 1, ai)));
                label.textContent = years[Math.max(0, Math.min(years.length - 1, ai))] || '\u2014';
                if (t < 1) { requestAnimationFrame(tick); }
                else { spinning = false; snap(targetIdx, true); }
            }
            requestAnimationFrame(tick);
        }

        snap(0, false);
        setTimeout(spinAndLand, 350);

        btnPrev.addEventListener('click', function () { snap(sel - 1, true); });
        btnNext.addEventListener('click', function () { snap(sel + 1, true); });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowUp')   { e.preventDefault(); snap(sel - 1, true); }
            if (e.key === 'ArrowDown') { e.preventDefault(); snap(sel + 1, true); }
        });

        viewport.addEventListener('wheel', function (e) {
            e.preventDefault();
            snap(sel + (e.deltaY > 0 ? 1 : -1), true);
        }, { passive: false });

        let tY = 0, tI = 0;
        viewport.addEventListener('touchstart', function (e) { if (spinning) return; tY = e.touches[0].clientY; tI = sel; }, { passive: true });
        viewport.addEventListener('touchmove',  function (e) {
            if (spinning) return;
            const ni = Math.max(0, Math.min(years.length - 1, tI + Math.round((tY - e.touches[0].clientY) / ITEM_H)));
            paint(ni); track.style.transition = 'none';
            track.style.transform = 'translateY(' + (center - ni * ITEM_H) + 'px)';
            label.textContent = years[ni]; sel = ni;
        }, { passive: true });
        viewport.addEventListener('touchend', function () { if (!spinning) snap(sel, true); }, { passive: true });

        let mD = false, mY = 0, mI = 0;
        viewport.addEventListener('mousedown', function (e) { if (spinning) return; mD = true; mY = e.clientY; mI = sel; });
        document.addEventListener('mousemove', function (e) {
            if (!mD) return;
            const ni = Math.max(0, Math.min(years.length - 1, mI + Math.round((mY - e.clientY) / ITEM_H)));
            paint(ni); track.style.transition = 'none';
            track.style.transform = 'translateY(' + (center - ni * ITEM_H) + 'px)';
            label.textContent = years[ni]; sel = ni;
        });
        document.addEventListener('mouseup', function () { if (mD) { mD = false; snap(sel, true); } });

    })();
</script>
</body>
</html>
